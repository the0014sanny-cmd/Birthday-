<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Priya</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff4e8a, #6a5cff, #ffb347);
  background-size: 500% 500%;
  animation: gradientMove 10s ease-in-out infinite alternate;
  color: white;
  text-align: center;
  overflow: hidden;
}
@keyframes gradientMove {
  0% {
    background-position: 0% 100%;
  }
  100% {
    background-position: 100% 0%;
  }
}
h1 {
  font-size: 56px;
  margin: 0;
  letter-spacing: 2px;
  text-shadow: 4px 4px 20px #0002;
}
.message {
  font-size: 24px;
  max-width: 660px;
  margin-top: 24px;
  line-height: 1.7;
  padding: 0 18px;
}
button {
  margin-top: 38px;
  padding: 13px 30px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: white;
  color: #ff4e8a;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 8px #0003;
}
button:hover {
  background: #ff4e8a;
  color: white;
  box-shadow: 0 4px 16px #0002;
}
#surprise {
  display: none;
  font-size: 33px;
  margin-top: 34px;
  font-family: 'Segoe Script', cursive, sans-serif;
}
.balloon {
  position: absolute;
  bottom: -150px;
  width: 64px;
  height: 85px;
  border-radius: 50% 50% 50% 50%/60% 60% 40% 40%;
  animation: float 10s linear infinite;
  opacity: 0.88;
  transition: opacity 0.6s;
  z-index: 0;
}
@keyframes float {
  0% {
    transform: translateY(0);
    opacity: 0.88;
  }
  85% {
    opacity: 0.80;
  }
  100% {
    transform: translateY(-120vh);
    opacity: 0.25;
  }
}
/* Balloon knot */
.balloon::after {
  content: '';
  display: block;
  position: absolute;
  left: 50%;
  bottom: -12px;
  transform: translateX(-50%);
  width: 12px;
  height: 18px;
  background: inherit;
  border-radius: 70% 70% 64% 64%/85% 70% 64% 64%;
  box-shadow: 0 1px 3px #0004;
}
</style>
</head>
<body>
<h1>Happy Birthday Priya 🎂</h1>
<div class="message">
  Priya,<br>
  Yahi dua hai ke tumhara har din khushiyo se bhara ho.<br>
  May your dreams come true &amp; memories be sweeter always.<br>
  You deserve all the joy in the world! 💖
</div>
<button onclick="showSurprise()">Open Birthday Surprise</button>
<div id="surprise">
  You are amazing Priya 🎉<br>
  Lots of love and smiles on your special day!
</div>
<!-- Balloons with different colors and floats -->
<div class="balloon" style="left:8%; background:#ff4081; animation-duration:9s;"></div>
<div class="balloon" style="left:25%; background:#ffeb3b; animation-duration:12s;"></div>
<div class="balloon" style="left:44%; background:#4caf50; animation-duration:10s;"></div>
<div class="balloon" style="left:62%; background:#00bcd4; animation-duration:12.5s;"></div>
<div class="balloon" style="left:79%; background:#2196f3; animation-duration:8.3s;"></div>
<div class="balloon" style="left:91%; background:#ff5722; animation-duration:11s;"></div>
<script>
function showSurprise() {
  document.getElementById("surprise").style.display = "block";
}
</script>
</body>
</html>
